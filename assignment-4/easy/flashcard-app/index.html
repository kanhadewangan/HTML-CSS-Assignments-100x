<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="flashcard-app">
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
          <div class="front" id="flashcard-front">Question?</div>
          <div class="back" id="flashcard-back">Answer</div>
        </div>
        <div class="controls">
          <button id="prev-btn">Previous</button>
          <button id="flip-btn">Flip</button>
          <button id="next-btn">Next</button>
        </div>
      </div>
      <form id="add-flashcard-form">
        <input type="text" id="question-input" placeholder="Enter question" required>
        <input type="text" id="answer-input" placeholder="Enter answer" required>
        <button type="submit">Add Flashcard</button>
      </form>
      <div class="flashcard-list" id="flashcard-list"></div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
