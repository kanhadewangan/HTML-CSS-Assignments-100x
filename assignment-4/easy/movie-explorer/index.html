<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            margin-top: 30px;
            color: #333;
        }
        #movie-list {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px 32px;
        }
        .movie-item {
            border-bottom: 1px solid #eee;
            padding: 16px 0;
        }
        .movie-item:last-child {
            border-bottom: none;
        }
        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #222;
        }
        .movie-details {
            color: #666;
            font-size: 0.98em;
            margin-top: 4px;
        }
        #search-button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #search-button:hover {       
                 background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Movie Explorer</h1>
    <input type="text" id="search-input" placeholder="Search for a movie..." style="display: block; margin: 20px auto; padding: 10px; width: 80%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px;">
    <button id="search-button">Search</button>

      <div id="movie-list">

      </div>




    
</body>
<script src="script.js"></script>
</html>
