<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        #meme-container {
            background: #333;
            padding: 30px 40px 40px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #meme-container input[type="text"] {
            margin: 10px 0;
            padding: 10px;
            border-radius: 6px;
            border: none;
            width: 250px;
            font-size: 1rem;
        }
        #meme-container input[type="file"] {
            margin: 10px 0;
            color: #fff;
        }
        #generate-btn {
            margin: 15px 0 20px 0;
            padding: 10px 30px;
            background: #ff9800;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #generate-btn:hover {
            background: #e65100;
        }
        #meme-canvas {
            margin-top: 20px;
            max-width: 100%;
            border: 2px solid #444;
            border-radius: 8px;
            background: #111;
        }
    </style>
</head>
<body>
    <h1>Meme Generator</h1>
    <div id="meme-container">
        <input type="text" id="top-text" placeholder="Top Text">
        <input type="text" id="bottom-text" placeholder="Bottom Text">
        <input type="file" id="image-upload" accept="image/*">
        <button id="generate-btn">Generate Meme</button>
        <canvas id="meme-canvas"></canvas>
    </div>
    
</body>
<script>
    function generateMeme() {
        const topText = document.getElementById('top-text').value;
        const bottomText = document.getElementById('bottom-text').value;
        const imageUpload = document.getElementById('image-upload');
        const canvas = document.getElementById('meme-canvas');
        const ctx = canvas.getContext('2d');

        if (imageUpload.files.length === 0) {
            alert('Please upload an image!');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.font = '40px Impact';
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'yellow';
                ctx.lineWidth = 2;
                ctx.textAlign = 'center';

                // Draw top text
                ctx.fillText(topText.toUpperCase(), canvas.width / 2, 50);
                ctx.strokeText(topText.toUpperCase(), canvas.width / 2, 50);

                // Draw bottom text
                ctx.fillText(bottomText.toUpperCase(), canvas.width / 2, canvas.height - 20);
                ctx.strokeText(bottomText.toUpperCase(), canvas.width / 2, canvas.height - 20);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(imageUpload.files[0]);
    }
    generateMeme();
    document.getElementById('generate-btn').addEventListener('click', generateMeme);
</script>
</html>
